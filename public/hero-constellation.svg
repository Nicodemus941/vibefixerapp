<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="100%" height="100%" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <!-- Animated network of nodes — visualizes the matching mechanic -->
  <defs>
    <radialGradient id="dotGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="1" />
      <stop offset="40%" stop-color="#10b981" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#10b981" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="dotGlowAlt" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="1" />
      <stop offset="40%" stop-color="#38bdf8" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0" />
      <stop offset="50%" stop-color="#10b981" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#10b981" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Connecting lines, faint -->
  <g stroke="url(#lineGrad)" stroke-width="0.8" fill="none">
    <line x1="180" y1="200" x2="420" y2="340" />
    <line x1="420" y1="340" x2="640" y2="180" />
    <line x1="640" y1="180" x2="880" y2="320" />
    <line x1="880" y1="320" x2="1050" y2="180" />
    <line x1="180" y1="200" x2="280" y2="540" />
    <line x1="280" y1="540" x2="520" y2="620" />
    <line x1="520" y1="620" x2="780" y2="560" />
    <line x1="780" y1="560" x2="1020" y2="640" />
    <line x1="420" y1="340" x2="520" y2="620" />
    <line x1="640" y1="180" x2="780" y2="560" />
    <line x1="880" y1="320" x2="1020" y2="640" />
  </g>

  <!-- Nodes with halo glow -->
  <g>
    <circle cx="180" cy="200" r="28" fill="url(#dotGlow)" opacity="0.7">
      <animate attributeName="opacity" values="0.4;0.9;0.4" dur="4s" repeatCount="indefinite" />
    </circle>
    <circle cx="180" cy="200" r="3" fill="#10b981" />

    <circle cx="420" cy="340" r="34" fill="url(#dotGlow)" opacity="0.5">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="5s" repeatCount="indefinite" begin="0.8s" />
    </circle>
    <circle cx="420" cy="340" r="4" fill="#10b981" />

    <circle cx="640" cy="180" r="40" fill="url(#dotGlowAlt)" opacity="0.6">
      <animate attributeName="opacity" values="0.4;0.85;0.4" dur="3.5s" repeatCount="indefinite" begin="1.2s" />
    </circle>
    <circle cx="640" cy="180" r="5" fill="#38bdf8" />

    <circle cx="880" cy="320" r="32" fill="url(#dotGlow)" opacity="0.55">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="4.5s" repeatCount="indefinite" begin="0.4s" />
    </circle>
    <circle cx="880" cy="320" r="4" fill="#10b981" />

    <circle cx="1050" cy="180" r="26" fill="url(#dotGlowAlt)" opacity="0.5">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="6s" repeatCount="indefinite" begin="2s" />
    </circle>
    <circle cx="1050" cy="180" r="3" fill="#38bdf8" />

    <circle cx="280" cy="540" r="30" fill="url(#dotGlow)" opacity="0.55">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="5.5s" repeatCount="indefinite" begin="1.6s" />
    </circle>
    <circle cx="280" cy="540" r="4" fill="#10b981" />

    <circle cx="520" cy="620" r="36" fill="url(#dotGlowAlt)" opacity="0.6">
      <animate attributeName="opacity" values="0.4;0.85;0.4" dur="4s" repeatCount="indefinite" begin="0.6s" />
    </circle>
    <circle cx="520" cy="620" r="5" fill="#38bdf8" />

    <circle cx="780" cy="560" r="34" fill="url(#dotGlow)" opacity="0.5">
      <animate attributeName="opacity" values="0.3;0.75;0.3" dur="5s" repeatCount="indefinite" begin="1.4s" />
    </circle>
    <circle cx="780" cy="560" r="4" fill="#10b981" />

    <circle cx="1020" cy="640" r="28" fill="url(#dotGlow)" opacity="0.55">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="6s" repeatCount="indefinite" begin="0.2s" />
    </circle>
    <circle cx="1020" cy="640" r="3" fill="#10b981" />
  </g>
</svg>
